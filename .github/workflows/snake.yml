name: generate snake animation

on:
  schedule:
    - cron: "0 0 * * *"     # once a day, midnight UTC
  workflow_dispatch: {}      # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: generate snake svg
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: sammmiksha
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23e091c0&color_dots=%232d1f5e,%234a3a7a,%237c5cbf,%23b39ddb,%23e091c0
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23e091c0&color_dots=%232d1f5e,%234a3a7a,%237c5cbf,%23b39ddb,%23e091c0

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
